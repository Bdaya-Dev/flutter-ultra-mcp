name: E2E macOS Desktop

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *' # Nightly 03:00 UTC (macOS runners are expensive)
  workflow_dispatch:

concurrency:
  group: e2e-macos-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  macos:
    name: Counter app — macOS desktop + AX sidecar
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm deps
        run: npm ci

      - name: Build TS servers
        run: npm run build

      - name: Flutter pub get (counter-app)
        working-directory: examples/counter-app
        run: flutter pub get

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Build counter-app for macOS
        working-directory: examples/counter-app
        run: flutter build macos --debug

      - name: Build AX sidecar (Swift)
        run: |
          if [ -d "vendor/sidecar-ax-swift" ]; then
            cd vendor/sidecar-ax-swift
            swift build -c release 2>/dev/null || echo "AX sidecar build skipped — source not yet available"
          else
            echo "AX sidecar not yet available — skipping native automation"
          fi

      - name: Launch app and verify
        working-directory: examples/counter-app
        run: |
          APP_BUNDLE=$(find build/macos/Build/Products/Debug -name "*.app" -type d | head -1)
          if [ -n "$APP_BUNDLE" ]; then
            open "$APP_BUNDLE" &
            sleep 5
            APP_PID=$(pgrep -f "counter_app" | head -1)
            if [ -n "$APP_PID" ]; then
              echo "App launched successfully (PID: $APP_PID)"
              kill "$APP_PID" 2>/dev/null || true
            else
              echo "App did not start"
              exit 1
            fi
          else
            echo "Build artifact not found"
            exit 1
          fi
