name: Release

on:
  push:
    branches: [main, next, beta, alpha]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Build, test & publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build
      - run: npm test

      # Bundle each MCP server into a single self-contained .cjs file.
      # These are force-added despite dist/ being in .gitignore, then
      # committed by @semantic-release/git so main always has up-to-date
      # bundles that work after git clone with zero npm install + build.
      - run: npm run bundle

      # semantic-release determines version from conventional commits,
      # generates CHANGELOG, then @semantic-release/exec calls
      # `npm publish --access public` which auto-detects OIDC
      # from the id-token:write permission (Trusted Publishing).
      # Zero tokens needed.
      #
      # The prepareCmd in .releaserc.json force-stages the bundled .cjs
      # files so @semantic-release/git can commit them alongside
      # package.json and CHANGELOG.md.
      # npm publish uses id-token:write permission (Trusted Publishing / OIDC)
      # which satisfies SLSA Level 2: provenance is attested via GitHub's
      # Sigstore-backed publish attestation — no manual token needed.
      - name: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: '0'
        run: npx semantic-release

      # Dart pub.dev publishing via GitHub OIDC trusted publishing.
      # Only runs on stable releases (main branch). Pre-release branches
      # (next/beta/alpha) skip this so only stable versions land on pub.dev.
      - uses: subosito/flutter-action@v2
        if: github.ref == 'refs/heads/main'
        with:
          channel: stable

      - name: Publish Dart packages to pub.dev
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          cd dart/ultra_flutter
          flutter pub get
          flutter pub publish --force
          cd ../../dart/ultra_flutter_devtools
          flutter pub get
          flutter pub publish --force
