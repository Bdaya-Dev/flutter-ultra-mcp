name: Chaos Tests

on:
  schedule:
    - cron: '30 3 * * *' # 03:30 UTC daily
  workflow_dispatch: # manual trigger
  push:
    branches: [main]
    paths:
      - 'tests/chaos/**'
      - 'shared/mcp-runtime/**'
      - 'shared/state-store/**'
      - 'shared/vm-service-client/**'

concurrency:
  group: chaos-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  chaos:
    name: Chaos suite (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Run chaos tests
        run: npx vitest run --config tests/chaos/vitest.config.ts --reporter=default --reporter=junit --outputFile=chaos-results.xml
        env:
          NODE_ENV: test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-results-${{ matrix.os }}
          path: chaos-results.xml
          retention-days: 30

  report:
    name: Chaos report
    needs: chaos
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Create issue on persistent failure
        uses: actions/github-script@v9
        with:
          script: |
            const title = `Chaos test failure — ${new Date().toISOString().split('T')[0]}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'chaos-failure',
              per_page: 5,
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `Recurring failure on ${new Date().toISOString()}.\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `Nightly chaos tests failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nPlease triage within 48h per AC-TS5.`,
                labels: ['chaos-failure', 'automated'],
              });
            }
