name: E2E iOS

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *' # Nightly 03:00 UTC (10x cost — not on every PR)
  workflow_dispatch:

concurrency:
  group: e2e-ios-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ios:
    name: Counter app — iOS Simulator
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm deps
        run: npm ci

      - name: Build TS servers
        run: npm run build

      - name: Boot iOS Simulator
        run: |
          RUNTIME=$(xcrun simctl list runtimes iOS -j | jq -r '.runtimes | map(select(.isAvailable)) | last | .identifier')
          DEVICE_ID=$(xcrun simctl create "flutter-test" "iPhone 16" "$RUNTIME")
          xcrun simctl boot "$DEVICE_ID"
          xcrun simctl bootstatus "$DEVICE_ID" -b
          echo "DEVICE_ID=$DEVICE_ID" >> $GITHUB_ENV

      - name: Run integration tests
        run: |
          flutter pub get
          flutter test --device-id "$DEVICE_ID" examples/counter-app/integration_test/app_test.dart

      - name: Shutdown simulator
        if: always()
        run: xcrun simctl shutdown "$DEVICE_ID" 2>/dev/null || true
