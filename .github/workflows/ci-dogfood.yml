name: Dogfood Gate

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: dogfood-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dogfood:
    name: Plugin smoke test — counter-app
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Flutter pub get
        working-directory: examples/counter-app
        run: flutter pub get
      - name: Run dogfood smoke test
        run: npm run test:dogfood
