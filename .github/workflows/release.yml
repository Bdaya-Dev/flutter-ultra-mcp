name: Release

on:
  push:
    branches: [main, next, beta, alpha]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  actions: write

jobs:
  release:
    name: Build, test & publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build
      - run: npm test

      # Bundle each MCP server into a single self-contained .cjs file.
      # These are force-added despite dist/ being in .gitignore, then
      # committed by @semantic-release/git so main always has up-to-date
      # bundles that work after git clone with zero npm install + build.
      - run: npm run bundle

      # semantic-release determines version from conventional commits,
      # generates CHANGELOG, then @semantic-release/exec calls
      # `npm publish --access public` which auto-detects OIDC
      # from the id-token:write permission (Trusted Publishing).
      # Zero tokens needed.
      #
      # The prepareCmd in .releaserc.json force-stages the bundled .cjs
      # files so @semantic-release/git can commit them alongside
      # package.json and CHANGELOG.md.
      # npm publish uses id-token:write permission (Trusted Publishing / OIDC)
      # which satisfies SLSA Level 2: provenance is attested via GitHub's
      # Sigstore-backed publish attestation — no manual token needed.
      - name: semantic-release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: '0'
        run: |
          npx semantic-release
          # Extract the tag semantic-release just created (if any)
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # Trigger pub.dev publish via workflow_dispatch with the tag ref.
      # pub.dev requires the OIDC token to carry a tag ref — workflow_run
      # and push-to-main events are server-side rejected.
      # GITHUB_TOKEN CAN trigger workflow_dispatch (explicitly exempted).
      - name: Trigger pub.dev publish
        if: steps.release.outputs.tag != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run publish-pub.yml --ref "${{ steps.release.outputs.tag }}"
