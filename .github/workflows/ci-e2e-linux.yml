name: E2E Linux Desktop

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: e2e-linux-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linux:
    name: Counter app — Linux desktop + AT-SPI (Xvfb)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            xvfb at-spi2-core libatspi2.0-dev \
            python3 python3-gi gir1.2-atspi-2.0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm deps
        run: npm ci

      - name: Build TS servers
        run: npm run build

      - name: Flutter pub get (counter-app)
        working-directory: examples/counter-app
        run: flutter pub get

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Build counter-app for Linux
        working-directory: examples/counter-app
        run: flutter build linux --debug

      - name: Start Xvfb and AT-SPI
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"
          sleep 2
          dbus-launch --exit-with-session /usr/libexec/at-spi-bus-launcher &
          sleep 1

      - name: Launch app under Xvfb and verify
        env:
          DISPLAY: ':99'
        working-directory: examples/counter-app
        run: |
          BUNDLE=$(find build/linux -name "counter_app" -type f -executable | head -1)
          if [ -n "$BUNDLE" ]; then
            "$BUNDLE" &
            APP_PID=$!
            sleep 5
            if kill -0 "$APP_PID" 2>/dev/null; then
              echo "App launched successfully (PID: $APP_PID)"
              kill "$APP_PID" 2>/dev/null || true
            else
              echo "App exited early"
              exit 1
            fi
          else
            echo "Build artifact not found"
            exit 1
          fi
