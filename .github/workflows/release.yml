name: Release

on:
  push:
    branches: [main, next, alpha, beta]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Publish packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - run: npm test
      # Trusted Publishing (OIDC) — no NPM_TOKEN needed.
      # Requires one-time setup on npmjs.com:
      #   Package Settings → Trusted Publisher → GitHub Actions
      #   → org: Bdaya-Dev, repo: flutter-ultra-mcp, workflow: release.yml
      # Provenance attestations are auto-generated.
      - name: Changesets publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx changeset publish
